<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ post.title }}</title>
    <style>
        :root {
            color-scheme: light;
            --page: #f7f5f0;
            --ink: #1f2933;
            --muted: #65717c;
            --line: #d9dee2;
            --accent: #1d7f72;
            --surface: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--page);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.7;
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0 64px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 28px;
            color: var(--accent);
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }

        article {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: clamp(24px, 5vw, 44px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(32px, 6vw, 48px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .meta,
        .excerpt {
            color: var(--muted);
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .excerpt {
            margin: 0 0 28px;
            font-size: 18px;
        }

        .content p:first-child {
            margin-top: 0;
        }

        .content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <main>
        <a class="back-link" href="{% url 'blog:post_list' %}">Back to posts</a>

        <article>
            <header>
                <h1>{{ post.title }}</h1>
                <div class="meta">
                    {% if post.published_at %}
                        <time datetime="{{ post.published_at|date:'c' }}">{{ post.published_at|date:"F j, Y" }}</time>
                    {% endif %}
                    {% if post.author %}
                        <span>by {{ post.author }}</span>
                    {% endif %}
                </div>
                {% if post.excerpt %}
                    <p class="excerpt">{{ post.excerpt }}</p>
                {% endif %}
            </header>

            <div class="content">
                {{ post.content|linebreaks }}
            </div>
        </article>
    </main>
</body>
</html>
